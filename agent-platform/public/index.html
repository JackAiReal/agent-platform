<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent 管理平台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand" data-i18n="brand">Agent Console</div>
        <button id="btn-lang" class="menu lang-switch" type="button">EN</button>
        <nav>
          <button class="menu active" data-tab="home" data-i18n="menu_home">首页</button>
          <button class="menu" data-tab="diary" data-i18n="menu_diary">Agent日记</button>
          <button class="menu" data-tab="output" data-i18n="menu_output">产出列表</button>
          <button class="menu" data-tab="cost" data-i18n="menu_cost">成本消耗</button>
          <button class="menu" data-tab="schedule" data-i18n="menu_schedule">定时列表</button>
          <a class="menu menu-link" href="/api/export.json" data-i18n="menu_export">导出数据(JSON)</a>
        </nav>
      </aside>

      <main class="content">
        <section id="home" class="tab active">
          <div class="home-head">
            <div>
              <h1 data-i18n="home_title">Agent 为了生存为了产出</h1>
              <p class="sub" data-i18n="home_sub">每日执行日志、产出记录、成本跟踪</p>
            </div>
            <button id="btn-logout" class="danger" data-i18n="logout">退出登录</button>
          </div>
          <div class="stats" id="summary"></div>
          <div class="home-grid">
            <div class="card">
              <h3>近14天趋势</h3>
              <canvas id="timeline-chart" height="120"></canvas>
            </div>
            <div class="card">
              <h3>待审核队列</h3>
              <div id="pending-list" class="pending-list"></div>
            </div>
          </div>
        </section>

        <section id="diary" class="tab">
          <h2>Agent日记</h2>
          <div class="toolbar">
            <input id="q-diary" placeholder="搜索关键词" />
            <input id="date-diary" type="date" />
            <select id="status-diary">
              <option value="">全部状态</option>
              <option value="pending">待审核</option>
              <option value="approved">已通过</option>
              <option value="rejected">需修改</option>
            </select>
            <button id="btn-diary-filter">筛选</button>
            <button id="btn-diary-reset">重置</button>
            <button id="btn-export-day">导出日报PDF</button>
            <button id="btn-export-week">导出周报PDF</button>
          </div>
          <form id="form-diary" class="entry-form">
            <input name="title" placeholder="标题" required />
            <input name="goal" placeholder="目标（必填建议）" />
            <textarea name="action" placeholder="动作：今天做了什么"></textarea>
            <textarea name="result" placeholder="结果：得到什么产出"></textarea>
            <textarea name="nextStep" placeholder="下一步：明天继续做什么"></textarea>
            <textarea name="content" placeholder="补充内容（可选，不填将自动由上面四项生成）"></textarea>
            <input name="imageUrl" placeholder="图片URL（可选）" />
            <input name="tags" placeholder="标签（逗号分隔）" />
            <input name="imageFile" type="file" accept="image/*" />
            <button type="submit">新增日记</button>
          </form>
          <div id="list-diary" class="entry-list"></div>
        </section>

        <section id="output" class="tab">
          <h2>产出列表</h2>
          <div class="toolbar">
            <input id="q-output" placeholder="搜索关键词" />
            <input id="date-output" type="date" />
            <select id="status-output">
              <option value="">全部状态</option>
              <option value="pending">待审核</option>
              <option value="approved">已通过</option>
              <option value="rejected">需修改</option>
            </select>
            <button id="btn-output-filter">筛选</button>
            <button id="btn-output-reset">重置</button>
          </div>
          <form id="form-output" class="entry-form">
            <input name="title" placeholder="产出标题（如：新增粉丝、发布文章）" required />
            <textarea name="content" placeholder="产出详情与价值" required></textarea>
            <input name="imageUrl" placeholder="图片URL（可选）" />
            <input name="tags" placeholder="标签（逗号分隔）" />
            <input name="imageFile" type="file" accept="image/*" />
            <button type="submit">新增产出</button>
          </form>
          <div id="list-output" class="entry-list"></div>
        </section>

        <section id="cost" class="tab">
          <h2>成本消耗</h2>
          <div class="toolbar">
            <input id="q-cost" placeholder="搜索关键词" />
            <input id="date-cost" type="date" />
            <select id="status-cost">
              <option value="">全部状态</option>
              <option value="pending">待审核</option>
              <option value="approved">已通过</option>
              <option value="rejected">需修改</option>
            </select>
            <button id="btn-cost-filter">筛选</button>
            <button id="btn-cost-reset">重置</button>
          </div>
          <form id="form-cost" class="entry-form">
            <input name="title" placeholder="成本事项标题" required />
            <textarea name="content" placeholder="为了什么目标而发生的成本" required></textarea>
            <div class="inline-fields">
              <input name="costMoney" type="number" step="0.01" placeholder="费用（元）" />
              <input name="costTimeMinutes" type="number" step="1" placeholder="时间成本（分钟）" />
            </div>
            <input name="imageUrl" placeholder="图片URL（可选）" />
            <input name="tags" placeholder="标签（逗号分隔）" />
            <input name="imageFile" type="file" accept="image/*" />
            <button type="submit">新增成本记录</button>
          </form>
          <div id="list-cost" class="entry-list"></div>
        </section>

        <section id="schedule" class="tab">
          <h2 data-i18n="schedule_title">定时列表</h2>
          <div class="schedule-toolbar">
            <button id="btn-schedule-refresh" data-i18n="schedule_refresh">刷新列表</button>
            <button id="btn-schedule-bootstrap" data-i18n="schedule_bootstrap">创建默认任务（12:00 + 23:00）</button>
          </div>
          <div id="list-schedule" class="entry-list"></div>
        </section>
      </main>
    </div>

    <div id="detail-modal" class="modal hidden">
      <div class="modal-panel">
        <button id="modal-close" class="modal-close">关闭</button>
        <div id="modal-body"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="/main.js"></script>
  </body>
</html>
