services:
  postgres:
    image: postgres:16-alpine
    container_name: maixu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: maixu
    ports:
      - '${MAIXU_DB_PORT:-5432}:5432'
    volumes:
      - maixu-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d maixu']
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: maixu-redis
    restart: unless-stopped
    ports:
      - '${MAIXU_REDIS_PORT:-6379}:6379'
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - maixu-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  maixu-postgres-data:
  maixu-redis-data:
